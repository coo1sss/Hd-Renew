name: HidenCloud-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * *'

jobs:
  run_hiden_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HidenCloud-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: |
          mv private/hiden_renew.py hiden_renew.py
          # 如果私库有续期记录文件，复制过来供脚本读取
          cp private/last_renew.txt . 2>/dev/null || echo "首次运行，无记录文件"

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理（可选）
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          HIDEN_ACCOUNT: ${{ secrets.HIDEN_ACCOUNT }}
          HIDEN_SERVICE_ID: ${{ secrets.HIDEN_SERVICE_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python hiden_renew.py

      - name: 💾 保存续期记录到私库
        if: always()
        run: |
          # 如果脚本生成了新的记录文件，写回私库
          if [ -f last_renew.txt ]; then
            cp last_renew.txt private/last_renew.txt
            cd private
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add last_renew.txt
            git commit -m "Update renewal state [skip ci]" || echo "无变更"
            git push
          fi

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
